            <button type="button" class="btn-add add-only" data-action="note-new" data-company-id="${cid}">＋ メモ追加</button>
          </div>
          <div class="co-history-timeline-wrap">
            ${renderTimeline(timeline, cid)}

    function switchDetailTab(tab, cid, deepLink = null) {
      document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
      document.getElementById('tab-status').style.display = tab === 'status' ? 'block' : 'none';
      document.querySelector('.company-detail-scroll')?.classList.toggle('co-history-scroll-mode', tab === 'history');
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'history') || (i === 1 && tab === 'status'));
      });
      const dl = deepLink || parseCompanyRoute(location.hash);
      let hash = `#company/${cid}${tab === 'status' ? '/status' : '/history'}`;
      if (dl?.section || dl?.appId) {
        const q = new URLSearchParams();
        if (dl.section) q.set('section', dl.section);
        if (dl.appId) q.set('app', dl.appId);
        const qs = q.toString();
        if (qs) hash += `?${qs}`;
      }
      history.replaceState(null, '', hash);

        const co = coMap[app.company_id];
        return `<tr data-app-id="${app.id}">
      <td><a class="co-link" href="#company/${app.company_id}">${co?.name || '—'}</a></td>
      <td><span class="badge badge-gray" style="font-size:10px">${app.course_type}</span></td>
      <td style="font-weight:500">${app.target_name}</td>
      <td style="font-size:12px">${app.measure_detail || '—'}</td>
      ${statusDateRowCells('over65', app)}
      <td>${stBadge(app.status)}</td>
      <td>${appEditBtn('over65', app)}</td>
    </tr>`;
      }).join('');
      const hidden = apps.length - filterExpiredApps(apps, 'over65').length;
      return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <h1 style="font-size:18px;font-weight:700;color:#111827">👴 65歳超雇用推進助成金 — 全件
      <span style="font-size:13px;color:#9ca3af;font-weight:400">${filtered.length}件</span>
      ${hidden ? `<span style="font-size:12px;color:#9ca3af;font-weight:400">（${hidden}件非表示）</span>` : ''}
    </h1>
    <div style="display:flex;align-items:center;gap:10px">
      ${hideExpiredToggle('background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:6px 12px')}
      ${addBtn('over65', '新規登録')}
    </div>
  </div>
  ${renderSubsidySearchBar('over65', query, '🔍 会社名・対象名で絞り込み...')}
  ${query ? `<p style="font-size:13px;color:#6b7280;margin-bottom:12px">「${query}」の検索結果: ${filtered.length} 件</p>` : ''}
  <div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>会社名</th><th>コース</th><th>対象・施策名</th><th>措置内容</th>
    ${statusDateHeaderCells('over65')}<th>状況</th><th></th></tr></thead>
    <tbody>${rows || '<tr><td colspan="9" style="text-align:center;color:#9ca3af;padding:24px">データなし</td></tr>'}</tbody>
  </table></div></div>`;
    }

    // ================================================================
    //  検索
    // ================================================================
    function normalizeSearchText(s) {
      return (s || '').replace(/[\s\u3000\u00a0]+/g, '');
    }
    function includesNormalized(haystack, needle) {
      if (!needle) return true;
      const n = normalizeSearchText(needle);
      if (!n) return true;
      return normalizeSearchText(haystack).includes(n);
    }
    function hashPath(hash) { return (hash || '').split('?')[0] || '#dashboard'; }
    function hashQuery(hash) {
      if (!hash || !hash.includes('?')) return '';
      return decodeURIComponent(new URLSearchParams(hash.split('?')[1]).get('q') || '');
    }
    function parseCompanyRoute(hash) {
      if (!hash?.startsWith('#company/')) return null;
      const withoutHash = hash.slice(1);
      const [pathPart, queryPart] = withoutHash.split('?');
      const segments = pathPart.split('/').filter(Boolean);
      if (segments[0] !== 'company' || !segments[1]) return null;
      const params = new URLSearchParams(queryPart || '');
      return {
        id: segments[1],
        tab: segments[2] === 'status' ? 'status' : 'history',
        section: params.get('section'),
        appId: params.get('app'),
      };
    }
    function buildCaseDeepLink(companyId, sectionType, appId, base) {
      const root = (base || defaultAppBaseUrl()).replace(/\/$/, '');
      const q = new URLSearchParams({ section: sectionType, app: appId });
      return `${root}#company/${companyId}/status?${q.toString()}`;
    }
    function applySearchDeepLink() {
      const sp = new URLSearchParams(location.search);
      const companyId = sp.get('company');
      if (!companyId) return;
      const tab = sp.get('tab') === 'history' ? 'history' : 'status';
      const hp = new URLSearchParams();
      const section = sp.get('section');
      const app = sp.get('app');
      if (section) hp.set('section', section);
      if (app) hp.set('app', app);
      let hash = `#company/${companyId}/${tab}`;
      const qs = hp.toString();
      if (qs) hash += `?${qs}`;
      history.replaceState(null, '', location.pathname + hash);
    }
    function filterSubsidyBySearch(apps, companies, query, type) {
      if (!query) return apps;
      const coMap = Object.fromEntries(companies.map(c => [c.id, c]));
      return apps.filter(app => {
        const texts = [coMap[app.company_id]?.name || ''];
        if (type === 'career_up' || type === 'dual') texts.push(app.employee_name || '');
        else if (type === 'reskill') texts.push(app.training_name || '');
        else if (type === 'over65') texts.push(app.target_name || '');
        return texts.some(t => includesNormalized(t, query));
      });
    }
    function renderSubsidySearchBar(route, query, placeholder) {
      const escQ = (query || '').replace(/"/g, '&quot;');
      return `<div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="subsidy-search-input" type="text" placeholder="${placeholder}" value="${escQ}"
        style="flex:1;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px"
        onkeydown="if(event.key==='Enter')doSubsidySearch('${route}')">
      <button onclick="doSubsidySearch('${route}')" style="padding:8px 16px;background:#2563eb;color:white;border-radius:8px;font-size:13px;cursor:pointer;border:none">検索</button>
      ${query ? `<button onclick="clearSubsidySearch('${route}')" style="padding:8px 12px;background:#f3f4f6;color:#374151;border-radius:8px;font-size:13px;cursor:pointer;border:none">クリア</button>` : ''}
    </div>`;
    }
    function doSubsidySearch(route) {
      const q = (document.getElementById('subsidy-search-input')?.value || '').trim();
      location.hash = q ? `#${route}?q=${encodeURIComponent(q)}` : `#${route}`;
    }
    function clearSubsidySearch(route) { location.hash = `#${route}`; }
    function doSearch() { const q = (document.getElementById('search-input')?.value || '').trim(); location.hash = q ? `#companies?q=${encodeURIComponent(q)}` : '#companies'; }
    function clearSearch() { location.hash = '#companies'; }

    // ================================================================
    //  上まで戻るボタン
    // ================================================================
    let scrollTopAbort = null;
    function scrollTopThreshold() { return 200; }
    function scrollTopTargets() {
      const targets = [document.documentElement, document.body];
      document.querySelectorAll('.company-detail-scroll, .co-history-timeline-wrap, .co-history-audit-table-wrap')
        .forEach(el => targets.push(el));
      return targets;
    }
    function updateScrollTopBtn() {
      const btn = document.getElementById('scroll-top-btn');
      if (!btn) return;
      const threshold = scrollTopThreshold();
      const show = scrollTopTargets().some(el => {
        if (el === document.body || el === document.documentElement) {
          return (window.scrollY || document.documentElement.scrollTop || 0) > threshold;
        }
        return el.scrollTop > threshold;
      });
      btn.classList.toggle('visible', show);
    }
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      scrollTopTargets().forEach(el => {
        if (el !== document.body && el !== document.documentElement) {
          el.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
    function bindScrollTopListeners() {
      scrollTopAbort?.abort();
      scrollTopAbort = new AbortController();
      const { signal } = scrollTopAbort;
      window.addEventListener('scroll', updateScrollTopBtn, { passive: true, signal });
      scrollTopTargets().forEach(el => {
        if (el !== document.body && el !== document.documentElement) {
          el.addEventListener('scroll', updateScrollTopBtn, { passive: true, signal });
        }
      });
      updateScrollTopBtn();
    }

    // ================================================================
    //  キャッシュ & ルーター
    // ================================================================
    let cache = null;
    async function getData() {
      if (!cache) {
        const [, data] = await Promise.all([loadProgramDeadlines(), fetchAll()]);
        cache = data;
      }
      rebuildAppLookup(cache);
      return cache;
    }

    async function router() {
      const hash = location.hash || '#dashboard';
      const path = hashPath(hash);
      const subsidyQ = hashQuery(hash);
      const content = document.getElementById('content');

      document.querySelectorAll('.nav-tab').forEach(tab => {
        const href = tab.getAttribute('href');
        tab.classList.toggle('active',
          (path === '#dashboard' && href === '#dashboard') || (path.startsWith('#companies') && href === '#companies') ||
          (path === '#career-up' && href === '#career-up') || (path === '#biz' && href === '#biz') ||
          (path === '#work' && href === '#work') || (path === '#dual' && href === '#dual') ||
          (path === '#reskill' && href === '#reskill') ||
          (path === '#over65' && href === '#over65') ||
          (path.startsWith('#company/') && href === '#companies')
        );
      });

      content.innerHTML = '<div style="text-align:center;padding:60px;color:#9ca3af">読み込み中...</div>';
      try {
        await loadProgramDeadlines();
        if (hash.startsWith('#company/')) {
          const coRoute = parseCompanyRoute(hash);
          const id = coRoute?.id || decodeURIComponent(hash.slice('#company/'.length).split(/[/?]/)[0]);
          const tab = coRoute?.tab || (hash.includes('/status') ? 'status' : 'history');
          const det = await fetchCompanyDetail(id);
          if (!cache) { cache = await fetchAll(); rebuildAppLookup(cache); }
          rebuildAppLookup({ ...cache, notes: det.notes, company: det.company });
          content.innerHTML = renderCompanyDetail(det, tab);
          if (coRoute?.section) {
            setTimeout(() => scrollToCompanyRecord(id, coRoute.section, coRoute.appId || null), 300);
          }
          return;
        }
        const data = await getData();
        if (path.startsWith('#companies')) {
          content.innerHTML = renderViewModeBanner() + renderCompanies(data, subsidyQ); return;
        }
        if (path === '#career-up') { content.innerHTML = renderViewModeBanner() + renderAllCareerUp(data.careerUp, data.companies, subsidyQ); return; }
        if (path === '#biz') { content.innerHTML = renderViewModeBanner() + renderAllBiz(data.biz, data.companies, subsidyQ); return; }
        if (path === '#work') { content.innerHTML = renderViewModeBanner() + renderAllWork(data.work, data.companies, subsidyQ); return; }
        if (path === '#dual') { content.innerHTML = renderViewModeBanner() + renderAllDual(data.dual, data.companies, subsidyQ); return; }
        if (path === '#reskill') { content.innerHTML = renderViewModeBanner() + renderAllReskill(data.reskill, data.companies, subsidyQ); return; }
        if (path === '#over65') { content.innerHTML = renderViewModeBanner() + renderAllOver65(data.over65, data.companies, subsidyQ); return; }
        content.innerHTML = renderViewModeBanner() + renderDashboard(data);
      } catch (err) {
        content.innerHTML = `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:18px;color:#991b1b">
      <div style="font-weight:700;margin-bottom:6px">⚠️ データの読み込みに失敗しました</div>
      <div style="font-size:13px">${err.message}</div>
      ${err.message.includes('RLS') || err.message.includes('row-level')
            ? `<div style="margin-top:10px;font-size:12px;background:#fff;border-radius:6px;padding:8px 12px;color:#7f1d1d">
           Supabase SQL エディターで以下を実行してください:<br>
           <code style="display:block;margin-top:6px;font-family:monospace;background:#fee2e2;padding:4px 8px;border-radius:4px">
             ALTER TABLE company_notes DISABLE ROW LEVEL SECURITY;
           </code></div>`: ''}
    </div>`;
      } finally {
        bindScrollTopListeners();
      }
    }

    window.addEventListener('hashchange', router);
    applySearchDeepLink();
    if (!location.hash || location.hash === '#') location.hash = '#dashboard';
    initContentActions();
    updateOperatorNav();
    bindScrollTopListeners();
    router();
  </script>
</body>

</html>
